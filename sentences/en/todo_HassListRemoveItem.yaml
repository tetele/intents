language: "en"
intents:
  HassListRemoveItem:
    data:
      - sentences:
          - (delete|remove) <item> (from|on|in) <my_list>
          - (delete|remove) <item> (off|from|on|in) <my_list>
        response: item_deleted
        requires_context:
          domain: todo
        expansion_rules:
          my_list: "[my|the] {name} [list]"
          item: "{todo_list_item:item}"
