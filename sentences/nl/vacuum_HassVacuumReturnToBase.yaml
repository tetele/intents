language: nl
intents:
  HassVacuumReturnToBase:
    data:
      - sentences:
          - "[stuur] <name> ([terug];[naar] <base>)"
          - "[stuur] <name> terug"
          - "laat <name> [terug] naar <base> (gaan|komen|rijden)"
          - "<name> terug sturen"
          - "<name> [terug] naar <base> laten (gaan|komen|rijden)"
        requires_context:
          domain: vacuum
        expansion_rules:
          base: "[de|het] (basisstation|basis|[t]huis)"
