---
language: "nl"
intents:
  HassCancelAllTimers:
    data:
      - sentences:
          - "(annuleer|stop) <all_timers>"
          - "<all_timers> (stoppen|annuleren|[op] stop zetten)"
          - "<all> <timer>[s] (stoppen|annuleren|[op] stop zetten) <in> <area>"
        expansion_rules:
          all_timers: >
            (
              ((<all>|al) [<my>] <timer>[s];[<in> <area>])
             |(<all>|al) [<my>] {area}[ ]<timer>[s]
            )
      - sentences:
          - "annuleer alle timers in deze ruimte"
          - "(annuleer|stop) (<here>;<timers>)"
          - "(<here>;<timers>) (stoppen|annuleren|[op] stop zetten)"
          - "<timers> (stoppen|annuleren|[op] stop zetten) <here>"
        expansion_rules:
          timers: (
            alle <timer>s
            |(iedere|elke) <timer>
            |al (mijn|m'n|de) <timer>s
            |[de] <timer>s
            )
        requires_context:
          area:
            slot: true
