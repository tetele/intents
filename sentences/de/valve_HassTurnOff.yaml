language: de
intents:
  HassTurnOff:
    data:
      # by name (+optional area/floor)
      - sentences:
          - "<schliessen> <name>[ <area_floor>]"
          - "<name>[ <area_floor>] <schliessen_end_of_sentence>"
          - "<name>[ <area_floor>] (zu|ab)[ ]drehen"
        requires_context:
          domain: valve
        slots:
          domain: valve
        response: valve
